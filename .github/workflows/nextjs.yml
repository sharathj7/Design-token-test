name: Build Next.js app

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "design-system-pilot/pnpm-lock.yaml"

      - name: Install dependencies
        run: cd design-system-pilot && pnpm install

      - name: Build Next.js app
        run: cd design-system-pilot && pnpm build --filter=web
